<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Compactor Co. — Service · Repair · PM Contracts</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="logo.jsx"></script>
  <script type="text/babel" src="compactors.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="pages.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
  (function () {
    const { useState, useEffect } = React;
    const Nav = window.UI.Nav;
    const Footer = window.UI.Footer;
    const HomePage = window.HomePage;
    const PlansPage = window.Pages.PlansPage;
    const EmergencyPage = window.Pages.EmergencyPage;
    const WhyPage = window.Pages.WhyPage;
    const ContactPage = window.Pages.ContactPage;
    const TweaksPanel = window.TweaksPanel;
    const useTweaks = window.useTweaks;
    const TweakSection = window.TweakSection;
    const TweakRadio = window.TweakRadio;
    const TweakSelect = window.TweakSelect;
    const TweakSlider = window.TweakSlider;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "regular",
      "heroCompactor": "vertical",
      "animSpeed": 60,
      "showHud": true
    }/*EDITMODE-END*/;

    function App() {
      const [page, setPage] = useState('home');
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      useEffect(() => {
        document.documentElement.setAttribute('data-theme', tweaks.theme);
        document.documentElement.setAttribute('data-density', tweaks.density);
      }, [tweaks.theme, tweaks.density]);

      const nav = (id) => { setPage(id); window.scrollTo({ top: 0, behavior: 'instant' }); };

      return (
        <>
          <Nav current={page} onNav={nav} />
          {page === 'home'      && <HomePage onNav={nav} heroType={tweaks.heroCompactor} speed={tweaks.animSpeed} />}
          {page === 'plans'     && <PlansPage onNav={nav} />}
          {page === 'emergency' && <EmergencyPage onNav={nav} />}
          {page === 'why'       && <WhyPage onNav={nav} />}
          {page === 'contact'   && <ContactPage />}
          <Footer onNav={nav} />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Theme">
              <TweakRadio
                label="Mode"
                value={tweaks.theme}
                onChange={v => setTweak('theme', v)}
                options={[
                  { value: 'dark', label: 'Dark navy' },
                  { value: 'light', label: 'Paper' },
                  { value: 'teal', label: 'Teal' },
                ]}
              />
              <TweakRadio
                label="Density"
                value={tweaks.density}
                onChange={v => setTweak('density', v)}
                options={[
                  { value: 'compact', label: 'Compact' },
                  { value: 'regular', label: 'Regular' },
                  { value: 'spacious', label: 'Spacious' },
                ]}
              />
            </TweakSection>

            <TweakSection title="Hero">
              <TweakSelect
                label="Hero compactor"
                value={tweaks.heroCompactor}
                onChange={v => setTweak('heroCompactor', v)}
                options={[
                  { value: 'vertical', label: 'Vertical baler' },
                  { value: 'selfcontained', label: 'Self-contained' },
                  { value: 'stationary', label: 'Stationary + hauler' },
                  { value: 'chute', label: 'Chute-fed' },
                ]}
              />
              <TweakSlider
                label="Cycle speed"
                value={tweaks.animSpeed}
                onChange={v => setTweak('animSpeed', v)}
                min={20} max={100} step={5}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  })();
  </script>
</body>
</html>
